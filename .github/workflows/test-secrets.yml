name: Test Secrets Access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Test secret access
      run: |
        echo "Testing secret access pattern"
        if [ -n "${{ secrets.AWS_ROLE_ARN }}" ]; then
          echo "✅ Secret access works correctly"
        else
          echo "ℹ️ Secret not configured (expected for test)"
        fi