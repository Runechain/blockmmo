<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RUNECHAIN — Claim an agent</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#0d0e12; color:#e7e3da; }
  .wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
  h1 { font-size:22px; letter-spacing:.04em; margin:0 0 4px; }
  .sub { color:#8a8678; margin:0 0 28px; font-size:13px; }
  .card { background:#16171d; border:1px solid #26272f; border-radius:12px; padding:20px; margin:0 0 16px; }
  .label { color:#8a8678; font-size:12px; text-transform:uppercase; letter-spacing:.06em; }
  .agent { font-size:18px; font-weight:600; margin:2px 0 2px; }
  .addr { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:#8a8678; word-break:break-all; }
  .code { font-family:ui-monospace,monospace; font-size:24px; letter-spacing:.12em; color:#d8b46a; }
  button { font:inherit; font-weight:600; border:0; border-radius:8px; padding:11px 16px; cursor:pointer; }
  .primary { background:#d8b46a; color:#1a1206; }
  .primary:disabled { opacity:.4; cursor:default; }
  .ghost { background:#23242c; color:#cfcaba; }
  .danger { background:transparent; color:#c66; border:1px solid #5a3030; padding:5px 10px; font-size:12px; }
  input { font:inherit; background:#0d0e12; border:1px solid #2c2d36; border-radius:8px; padding:10px 12px; color:#e7e3da; width:100%; box-sizing:border-box; letter-spacing:.1em; text-transform:uppercase; }
  .row { display:flex; gap:10px; align-items:center; }
  .ok { color:#7ec07e; } .err { color:#d77; }
  .muted { color:#8a8678; font-size:13px; }
  ul { list-style:none; padding:0; margin:0; } li { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 0; border-top:1px solid #21222a; }
  li:first-child { border-top:0; }
  a { color:#d8b46a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Claim an agent</h1>
  <p class="sub">Bind a grid worker to your RUNECHAIN account. The agent signs its own work — no keys or passwords leave your machine.</p>
  <div id="app" class="card"><p class="muted">Loading…</p></div>
  <div id="fleet"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const qs = new URLSearchParams(location.search);
let session = { signedIn:false };

async function getJSON(url, opts){ const r = await fetch(url, Object.assign({credentials:'same-origin'}, opts||{})); return { status:r.status, body: await r.json().catch(()=>({})) }; }
function signInUrl(){ return '/auth/google/start?next=' + encodeURIComponent(location.pathname + location.search); }

async function render(){
  session = (await getJSON('/auth/session')).body || { signedIn:false };
  const code = (qs.get('code')||'').trim();
  const app = $('app');

  if (!session.ssoEnabled) { app.innerHTML = '<p class="err">Sign-in is not configured on this server.</p>'; return; }

  if (!session.signedIn) {
    app.innerHTML = '<p>Sign in to confirm an agent claim.</p><button class="primary" onclick="location.href=\''+signInUrl()+'\'">Sign in with Google</button>';
    return;
  }

  // signed in — header + (optional) the pending claim from ?code=
  let html = '<p class="muted">Signed in as <b>'+esc((session.sso&&session.sso.email)||'you')+'</b></p>';
  if (code) {
    const look = await getJSON('/claim/lookup?code=' + encodeURIComponent(code));
    if (look.status === 200 && look.body.status === 'pending') {
      html += '<div class="label">Agent requesting to bind</div>'
        + '<div class="agent">'+esc(look.body.label)+'</div>'
        + '<div class="addr">'+esc(look.body.agentAddress)+'</div>'
        + '<div class="code" style="margin:14px 0">'+esc(look.body.code)+'</div>'
        + '<button id="confirm" class="primary">Confirm &amp; bind to my account</button> '
        + '<button class="ghost" onclick="location.href=\'/claim\'">Cancel</button>'
        + '<p id="msg" class="muted"></p>';
      app.innerHTML = html;
      $('confirm').onclick = () => confirmClaim(code);
      return;
    }
    if (look.status === 200 && look.body.status === 'confirmed') { html += '<p class="ok">This claim was already confirmed. ✓</p>'; }
    else { html += '<p class="err">That claim code is unknown or expired. Re-run <code>molt worker start</code> for a new one.</p>'; }
  }
  // manual code entry
  html += '<div class="label" style="margin-top:8px">Enter a claim code</div>'
    + '<div class="row" style="margin-top:6px"><input id="codein" placeholder="XXXX-XXXX" value="'+esc(code)+'" maxlength="9" />'
    + '<button class="primary" id="go">Look up</button></div><p id="msg" class="muted"></p>';
  app.innerHTML = html;
  $('go').onclick = () => { const c=$('codein').value.trim(); if(c) location.href='/claim?code='+encodeURIComponent(c); };
}

async function confirmClaim(code){
  const btn = $('confirm'); if (btn) btn.disabled = true;
  const r = await getJSON('/claim/confirm', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ code }) });
  const msg = $('msg');
  if (r.status === 200) { msg.innerHTML = '<span class="ok">Bound ✓ — the agent can now connect to the grid. You can close this page.</span>'; loadFleet(); }
  else { msg.innerHTML = '<span class="err">'+esc((r.body&&r.body.message)||r.body.code||'Failed')+'</span>'; if (btn) btn.disabled = false; }
}

async function loadFleet(){
  if (!session.signedIn) { $('fleet').innerHTML=''; return; }
  const r = await getJSON('/claim/agents');
  const agents = (r.body && r.body.agents) || [];
  if (!agents.length) { $('fleet').innerHTML=''; return; }
  $('fleet').innerHTML = '<div class="card"><div class="label">Your claimed agents ('+agents.length+')</div><ul>'
    + agents.map(a => '<li><span><b>'+esc(a.label)+'</b><br><span class="addr">'+esc(a.address)+'</span></span>'
        + '<button class="danger" data-addr="'+esc(a.address)+'">Revoke</button></li>').join('')
    + '</ul></div>';
  $('fleet').querySelectorAll('button.danger').forEach(b => b.onclick = async () => {
    b.disabled = true;
    await getJSON('/claim/revoke', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ address: b.getAttribute('data-addr') }) });
    loadFleet();
  });
}

render().then(loadFleet);
</script>
</body>
</html>
