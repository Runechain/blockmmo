<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RUNECHAIN - Coming Soon</title>
<meta name="description" content="RUNECHAIN is not ready for public play yet. Join the mailing list for launch updates." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23070719'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%23f5c268' stroke-width='4'/%3E%3Cpath d='M22 18h12c8 0 12 4 12 10 0 4-2 7-6 9l8 11h-9l-7-10h-3v10h-7V18zm7 7v7h5c3 0 5-1 5-4s-2-3-5-3h-5z' fill='%23f5c268'/%3E%3C/svg%3E" />
<style>
  :root{
    --night:#070719;
    --gold:#f5c268;
    --muted:#cbb88a;
    --text:#fff1cf;
    --line:rgba(245,194,104,.38);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:28px;
    background:
      linear-gradient(180deg,rgba(7,7,25,.44),rgba(7,7,25,.96)),
      url("/assets/brand/runechain-lander.png") center / min(86vw,620px) auto no-repeat,
      var(--night);
    color:var(--text);
    font-family:Georgia,"Times New Roman",serif;
  }
  main{
    width:min(720px,100%);
    padding:34px;
    border:1px solid var(--line);
    background:rgba(7,7,25,.84);
    box-shadow:0 22px 80px rgba(0,0,0,.54);
  }
  h1{
    margin:0;
    color:var(--gold);
    font-size:clamp(48px,9vw,94px);
    line-height:.9;
    letter-spacing:.05em;
    text-transform:uppercase;
  }
  p{
    max-width:560px;
    margin:22px 0 0;
    color:#e6d6b0;
    font-size:20px;
    line-height:1.5;
  }
  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:30px;
    font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:46px;
    padding:0 18px;
    border:1px solid var(--gold);
    color:var(--gold);
    text-decoration:none;
    font-size:12px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
  }
  a.primary{
    background:linear-gradient(180deg,#f4c36a,#b87320);
    color:#120b08;
  }
</style>
</head>
<body>
<main>
  <h1>Coming Soon</h1>
  <p>The parish gates are closed while RUNECHAIN is being prepared for public play. Join the mailing list for the first open test.</p>
  <div class="actions">
    <a class="primary" href="/#join">Join the mailing list</a>
    <a href="/">Return to RUNECHAIN</a>
  </div>
</main>
</body>
</html>
